name: Build and Deploy

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '9.0.x'

    - name: Publish
      run: dotnet publish StudentPortal.csproj -c Release -o ./output

    - name: Zip output
      run: Compress-Archive -Path ./output/* -DestinationPath ./StudentPortal.zip

    - name: Upload ZIP as artifact
      uses: actions/upload-artifact@v4
      with:
        name: StudentPortal
        path: StudentPortal.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Download ZIP artifact
      uses: actions/download-artifact@v4
      with:
        name: StudentPortal

    - name: Copy ZIP to EC2 via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        source: "StudentPortal.zip"
        target: "C:/inetpub/wwwroot/StudentPortal/"

    - name: Run deploy script on EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        timeout: 60s
        command_timeout: 10m
        script: |
          C:\deploy.bat 

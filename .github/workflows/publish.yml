name: Build and Zip
 
 
on:
  workflow_dispatch:
 
jobs:
  build:
    runs-on: windows-latest
 
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
 
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '9.0.x'
 
    - name: Publish
      run: dotnet publish StudentPortal.csproj -c Release -o ./output
 
    - name: Zip output
      run: Compress-Archive -Path ./output/* -DestinationPath ./StudentPortal.zip
 
    - name: Upload ZIP
      uses: actions/upload-artifact@v4
      with:
        name: StudentPortal
        path: StudentPortal.zip
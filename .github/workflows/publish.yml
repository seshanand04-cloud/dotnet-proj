name: Build and Zip

on:
  workflow_dispatch:
 
jobs:
  build:
    runs-on: windows-latest
 
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
 
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '9.0.x'
 
    - name: Publish
      run: dotnet publish StudentPortal.csproj -c Release -o ./output
 
    - name: Zip output
      run: Compress-Archive -Path ./output/* -DestinationPath ./StudentPortal.zip
 
    - name: Upload ZIP
      uses: actions/upload-artifact@v4
      with:
        name: StudentPortal
        path: StudentPortal.zip

  transfer:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Download ZIP artifact
      uses: actions/download-artifact@v4
      with:
        name: StudentPortal

    - name: Upload ZIP to EC2 via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        password: ${{ secrets.EC2_PASSWORD }}
        port: 21
        local-dir: ./
        server-dir: /StudentPortal/
        include: |
          StudentPortal.zip

  deploy:
    runs-on: ubuntu-latest
    needs: transfer

    steps:
    - name: Stop app pool, extract files, start app pool
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        timeout: 60s
        command_timeout: 10m
        script: |
          powershell -Command "Stop-WebAppPool -Name 'DefaultAppPool'; Start-Sleep -Seconds 3; Expand-Archive -Path 'C:/inetpub/wwwroot/StudentPortal/StudentPortal.zip' -DestinationPath 'C:/inetpub/wwwroot/StudentPortal' -Force; Remove-Item 'C:/inetpub/wwwroot/StudentPortal/StudentPortal.zip' -Force; Start-WebAppPool -Name 'DefaultAppPool'; Start-WebSite -Name 'Studentportal'; Write-Host 'Deployment done'"